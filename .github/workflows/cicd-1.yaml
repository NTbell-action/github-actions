name: cicd-1
on:
  pull_request:
    types: [opend, synchronize, closed]
    branches: [dev]
    paths:
      - "my-app/**"

jobs:
  test: # 테스트 작업
    if: github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: checkout # 체크아웃 액션을 사용하여 코드를 가져옴
        uses: actions/checkout@v4

  image-build: # 이미지 빌드 작업
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

  deploy: # 배포 작업
    runs-on: ubuntu-latest
    needs: [imgae-build]
    steps:
      - name: checkout
        uses: actions/checkout@v4
