name: needs
# needs 하나의 워크플로우에서 여러 개의 잡을 사용하는 경우가 많음
# job간에 종속성 생성
# 하나의 job이 다른 job또는 여러 job이 완료될때 실행되도록 사용
# 즉, 여러 job의 실행 순서를 조절 가능!

on: push

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
    - name: echo
      run: echo "job1 done"

  job2:
    runs-on: ubuntu-latest
    needs: [job1] #job1 성공시 job2 실행
    steps:
    - name: echo
      run: echo "job2 done"

  job3:
    runs-on: ubuntu-latest
    steps:
    - name: echo
      run: |
      echo "job3 failed"
      exit 1 
    # exit 1 사용시 강제 실패함

  job4:
    runs-on: ubuntu-latest
    needs: [job3]
    steps:
    - name: echo
      run: echo "job3 done"